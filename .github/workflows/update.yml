name: Update dashboard data

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Data mode"
        type: choice
        options:
          - demo
          - debug-books
          - real-books
        default: real-books

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Cache Beige Book corpus
        uses: actions/cache@v4
        with:
          path: ~/.bb_cache
          key: bb-cache-v2

      - name: Build data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -u build_data.py --${{ github.event.inputs.mode }} --out site/data.js

      - name: Commit if changed
        run: |
          git config user.name "beigebook-bot"
          git config user.email "bot@users.noreply.github.com"
          git add site/data.js
          git diff --cached --quiet && echo "no change" || \
            (git commit -m "data: ${{ github.event.inputs.mode }} refresh" && git push)
