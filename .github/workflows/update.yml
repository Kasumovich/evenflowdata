name: Update dashboard data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Build data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python build_data.py --demo --out site/data.js
      - name: Commit if changed
        run: |
          git config user.name "beigebook-bot"
          git config user.email "bot@users.noreply.github.com"
          git add site/data.js
          git diff --cached --quiet && echo "no change" || (git commit -m "data: refresh" && git push)
