name: Probe pre-2011

# One-off diagnostic: runs probe_pre2011.py in CI (which can reach federalreserve.gov)
# and prints the result. Trigger it manually from the Actions tab. Safe to delete after.

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run probe
        run: python -u probe_pre2011.py
